# CloudFlare Pages Configuration - DEPRECATED
# Bu dosya artık kullanılmıyor. Subdomain yapısı için aşağıdaki dosyaları kullanın:
#
# - cloudflare-pages-landing.toml → randevum.tr (marketing site)
# - cloudflare-pages-app.toml → app.randevum.tr (dashboard/admin)
#
# Subdomain'ler ayrı Cloudflare Pages projesi olarak deploy edilmelidir.

# === LEGACY CONFIG (Referans) ===

# Build settings
[build]
  command = "npm run build"
  publish = "dist"

# Environment variables (override in CloudFlare dashboard)
[build.environment]
  NODE_VERSION = "20"

# Redirects (optional)
[[redirects]]
  from = "/api/*"
  to = "https://api.randevum.tr/:splat"
  status = 200
  force = true

# Headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
